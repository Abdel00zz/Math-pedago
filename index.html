<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Center Scientific of Mathematics</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FF6B35" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/public/icone.png" />
    <link rel="icon" type="image/png" href="/icone.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Centre Scientifique" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#FF6B35',
              'primary-light': '#FFEFE6',
              secondary: '#737373', // neutral-500
              background: '#FAFAFA', // neutral-50
              surface: '#FFFFFF',
              border: '#E5E5E5', // neutral-200
              'border-hover': '#D4D4D4', // neutral-300
              text: '#262626', // neutral-800
              'text-secondary': '#737373', // neutral-500
              'text-disabled': '#A3A3A3', // neutral-400
              success: '#10B981', // emerald-500
              warning: '#F59E0B', // amber-500
              error: '#EF4444', // red-500
              info: '#3B82F6', // blue-500
              'modal-backdrop': 'rgba(250, 250, 250, 0.8)', // neutral-50 with opacity
              // Legacy colors mapped to new system for compatibility
              'card-bg': '#FFFFFF',
              'text-primary': '#262626',
              'border-color': '#E5E5E5',
              'light-gray': '#E5E5E5',
            },
            fontFamily: {
              // Polices principales style Coursera
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              serif: ['Merriweather', 'Georgia', 'serif'],
              
              // Polices pour différents usages
              title: ['Inter', 'system-ui', 'sans-serif'], // Titres principaux
              subtitle: ['Open Sans', 'sans-serif'], // Sous-titres
              body: ['Open Sans', 'sans-serif'], // Corps de texte
              button: ['Inter', 'sans-serif'], // Boutons et CTAs
              brand: ['Inter', 'sans-serif'], // Nom de marque
              
              // Polices spécifiques
              mono: ['JetBrains Mono', 'Courier New', 'monospace'], // Code
              display: ['Poppins', 'Inter', 'sans-serif'], // Grandes bannières
              reading: ['Source Serif Pro', 'Georgia', 'serif'], // Lecture longue
              
              // Polices alternatives pour compatibilité
              'inter': ['Inter', 'sans-serif'],
              'open-sans': ['Open Sans', 'sans-serif'],
              'source-serif': ['Source Serif Pro', 'serif'],
              'merriweather': ['Merriweather', 'serif'],
              'poppins': ['Poppins', 'sans-serif'],
              'roboto': ['Roboto', 'sans-serif'],
              'jetbrains': ['JetBrains Mono', 'monospace'],
            },
            boxShadow: {
              'claude': '0 4px 12px rgba(0, 0, 0, 0.08)',
            },
            keyframes: {
                fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                slideInUp: { '0%': { transform: 'translateY(10px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
                slideInRight: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(0)' } },
                pulse: { '0%, 100%': { opacity: 1, transform: 'scale(1)' }, '50%': { opacity: .9, transform: 'scale(1.02)' } },
                ping: { '75%, 100%': { transform: 'scale(2)', opacity: 0 } },
                cursorBlink: { '0%, 100%': { opacity: 1 }, '50%': { opacity: 0 } },
                clipPathReveal: {
                    '0%': { clipPath: 'polygon(0 0, 100% 0, 100% 0, 0 0)' },
                    '100%': { clipPath: 'polygon(0 0, 100% 0, 100% 100%, 0 100%)' },
                }
            },
            animation: {
                fadeIn: 'fadeIn 0.3s ease-out forwards',
                slideInUp: 'slideInUp 0.4s ease-out forwards',
                slideInRight: 'slideInRight 0.5s ease-out forwards',
                pulse: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                ping: 'ping 1s cubic-bezier(0, 0, 0.2, 1) infinite',
                cursorBlink: 'cursorBlink 1.2s step-end infinite',
                clipPathReveal: 'clipPathReveal 1s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards'
            },
          }
        }
      }
    </script>
    
    <!-- Google Fonts - Style Coursera -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@400;600;700&family=Merriweather:wght@300;400;700&family=Source+Serif+Pro:wght@400;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        /* Style global inspiré de Coursera */
        body { 
          font-family: 'Open Sans', system-ui, -apple-system, sans-serif;
          background-color: #FAFAFA;
          color: #262626;
          font-size: 16px;
          line-height: 1.7;
          letter-spacing: -0.01em;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          font-weight: 400;
        }
        
        /* Styles pour les titres */
        h1, h2, h3, h4, h5, h6 {
          font-family: 'Inter', system-ui, sans-serif;
          font-weight: 700;
          line-height: 1.3;
          letter-spacing: -0.02em;
        }
        
        h1 { font-size: 2.5rem; font-weight: 800; }
        h2 { font-size: 2rem; font-weight: 700; }
        h3 { font-size: 1.5rem; font-weight: 600; }
        h4 { font-size: 1.25rem; font-weight: 600; }
        
        /* Style pour les paragraphes de lecture */
        p {
          font-family: 'Open Sans', sans-serif;
          line-height: 1.8;
        }
        
        /* Style pour le contenu éducatif */
        .educational-content {
          font-family: 'Merriweather', Georgia, serif;
          font-size: 17px;
          line-height: 1.9;
          letter-spacing: 0;
        }
        
        /* Boutons style Coursera */
        button, .btn {
          font-family: 'Inter', sans-serif;
          font-weight: 600;
          letter-spacing: -0.01em;
        }
        
        /* Code et éléments techniques */
        code, pre, .code-block {
          font-family: 'JetBrains Mono', 'Courier New', monospace;
          font-size: 14px;
        }
        
        /* Navigation */
        nav {
          font-family: 'Inter', sans-serif;
          font-weight: 500;
        }
        
        /* Listes avec style antique */
        .antique-list::marker {
            font-family: 'Merriweather', serif;
            font-weight: 700;
            color: #737373;
        }
        
        /* Material Icons */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Style pour les badges et labels */
        .badge, .label {
          font-family: 'Inter', sans-serif;
          font-weight: 600;
          font-size: 12px;
          letter-spacing: 0.05em;
          text-transform: uppercase;
        }
        
        /* Style pour les citations */
        blockquote {
          font-family: 'Merriweather', serif;
          font-style: italic;
          font-weight: 300;
        }
    </style>
    
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.1.1/",
        "react": "https://aistudiocdn.com/react@^19.1.1",
        "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
        "better-react-mathjax": "https://aistudiocdn.com/better-react-mathjax@^2.3.0"
      }
    }
    </script>

<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    
    <script>
        // Enregistrement du Service Worker pour la PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker enregistré avec succès:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('Échec de l\'enregistrement du Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
