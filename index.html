<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plateforme Pédagogique</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#0056d2',
              secondary: '#5a6572',
              accent: '#f0b129',
              background: '#f7f9fa',
              'text-primary': '#1f2937',
              'card-bg': '#ffffff',
              'border-color': '#d1d7dc',
              'light-gray': '#eef2f5',
              success: '#06842c',
              error: '#c72525',
              info: '#1a73e8'
            },
            fontFamily: {
              sans: ['Fira Sans', 'sans-serif'],
              serif: ['Roboto Slab', 'serif'],
            },
            keyframes: {
                fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
                slideInUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
                slideInRight: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(0)' } },
                pulse: { '0%, 100%': { opacity: 1, transform: 'scale(1)' }, '50%': { opacity: .9, transform: 'scale(1.02)' } },
                'pulse-subtle': { '0%, 100%': { opacity: 1, boxShadow: '0 0 0 0 rgba(59, 130, 246, 0.4)' }, '50%': { opacity: 0.95, boxShadow: '0 0 0 4px rgba(59, 130, 246, 0.1)' } },
                ping: { '75%, 100%': { transform: 'scale(2)', opacity: 0 } },
                cursorBlink: { '0%, 100%': { opacity: 1 }, '50%': { opacity: 0 } },
                confettiFall: {
                    '0%': { transform: 'translateY(-10vh) rotateZ(0deg)', opacity: 1 },
                    '100%': { transform: 'translateY(110vh) rotateZ(360deg)', opacity: 0 }
                },
                confettiSpin: {
                    '0%': { transform: 'rotateY(0deg)' },
                    '100%': { transform: 'rotateY(360deg)' }
                }
            },
            animation: {
                fadeIn: 'fadeIn 0.5s ease-out forwards',
                slideInUp: 'slideInUp 0.6s ease-out forwards',
                slideInRight: 'slideInRight 0.5s ease-out forwards',
                pulse: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'pulse-subtle': 'pulse-subtle 3s ease-in-out infinite',
                ping: 'ping 1s cubic-bezier(0, 0, 0.2, 1) infinite',
                cursorBlink: 'cursorBlink 1.2s step-end infinite',
            },
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;700&family=Roboto+Slab:wght@700&family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Fira Sans', sans-serif; }
        .styled-list::marker {
            font-family: 'Roboto Slab', serif;
            font-weight: 700;
            color: #0056d2; /* primary color */
            font-size: 1.1em;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.1.1/",
        "react": "https://aistudiocdn.com/react@^19.1.1",
        "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
        "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
        "better-react-mathjax": "https://aistudiocdn.com/better-react-mathjax@^2.3.0"
      }
    }
    </script>

<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
